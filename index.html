<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJ STUDIO | AI Wedding RSVP Generator</title>
    <style>
        :root {
            --forest-green: #2d4f3e;
            --cream: #fdfaf6;
            --soft-brown: #8b7355;
            --white: #ffffff;
            --gold: #c5a059;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--cream); color: var(--forest-green); margin: 0; }
        
        /* Header Logo Section */
        .logo-header { background: var(--white); padding: 15px 5%; text-align: center; border-bottom: 2px solid var(--forest-green); }
        .logo-header img { max-height: 80px; width: auto; }

        nav { padding: 20px 5%; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .hero { text-align: center; padding: 100px 5%; background: linear-gradient(rgba(45, 79, 62, 0.8), rgba(45, 79, 62, 0.8)), url('599106.jpg'); background-size: cover; color: var(--white); }
        .btn { background: var(--gold); color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; }
        .section { padding: 80px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        
        #editorModal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 500px; }

        #chat-widget { position: fixed; bottom: 80px; right: 20px; width: 300px; background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); display: none; overflow: hidden; }
        .chat-header { background: var(--forest-green); color: white; padding: 15px; }
        #chat-box { height: 250px; overflow-y: auto; padding: 15px; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>

    <div class="logo-header">
        <img src="601126.jpg" alt="AJ Studio Logo">
    </div>

    <nav>
        <span>Features</span> | <span>Pricing</span> | <span>Login</span>
    </nav>

    <header class="hero">
        <h1>AI Wedding RSVP Generator</h1>
        <p>Create beautiful forest-themed wedding invitations instantly.</p>
        <a href="#templates" class="btn">Start Create Now</a>
    </header>

    <section id="templates" class="section">
        <h2 style="text-align: center;">Choose Your Template</h2>
        <div class="grid" id="templateGrid"></div>
    </section>

    <div id="editorModal">
        <div class="modal-content">
            <h3>Edit Invitation</h3>
            <input type="text" id="editName" placeholder="Couple Names" style="width:100%; margin-bottom:10px;">
            <input type="date" id="editDate" style="width:100%; margin-bottom:10px;">
            <button class="btn" onclick="saveData()">Save & Preview</button>
            <button onclick="document.getElementById('editorModal').style.display='none'">Close</button>
        </div>
    </div>

    <div id="chat-widget">
        <div class="chat-header">AJ Assistant</div>
        <div id="chat-box"></div>
        <input type="text" id="chat-input" placeholder="Type a message..." style="width:90%; padding:10px;">
    </div>
    <button style="position:fixed; bottom:20px; right:20px; padding: 15px; border-radius: 50%;" onclick="document.getElementById('chat-widget').style.display='block'">💬</button>

    <script>
        const templates = ["Forest", "Luxury", "Minimal", "Royal", "Floral", "Rustic"];
        const grid = document.getElementById('templateGrid');
        templates.forEach(t => {
            grid.innerHTML += `<div class="card"><h3>${t} Theme</h3><button class="btn" onclick="openEditor('${t}')">Edit</button></div>`;
        });

        function openEditor(t) { document.getElementById('editorModal').style.display = 'flex'; }

        function saveData() {
            localStorage.setItem('weddingData', JSON.stringify({
                name: document.getElementById('editName').value,
                date: document.getElementById('editDate').value
            }));
            alert('Data saved!');
        }

        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const msg = this.value.toLowerCase();
                let reply = "I'm sorry, I don't understand. Ask about templates, pricing, or how to use!";
                if(msg.includes('template')) reply = "For a forest wedding, I recommend our Forest or Rustic themes!";
                if(msg.includes('price')) reply = "Free plan, Pro (RM10/mo), and VIP (RM29/mo).";
                if(msg.includes('how to')) reply = "1. Select template, 2. Click Edit, 3. Save, 4. Share!";
                document.getElementById('chat-box').innerHTML += `<p><b>You:</b> ${this.value}</p><p><b>AI:</b> ${reply}</p>`;
                this.value = '';
            }
        });
    </script>
</body>
</html>
